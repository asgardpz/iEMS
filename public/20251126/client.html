<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>iEMS Client 前台模擬</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", Arial; padding: 20px; line-height: 1.5; }
    header { margin-bottom: 20px; }
    section { border: 1px solid #ccc; padding: 16px; border-radius: 8px; margin-bottom: 20px; }
    h2 { margin: 0 0 10px; font-size: 18px; }
    label { display: block; margin-top: 8px; font-size: 14px; }
    input, textarea, select { width: 100%; padding: 8px; margin-top: 4px; font-size: 14px; }
    button { margin-top: 12px; padding: 8px 12px; font-size: 14px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 8px; white-space: pre-wrap; word-wrap: break-word; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .note { color: #666; font-size: 12px; margin-top: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>iEMS Client 前台模擬</h1>
    <div class="note">API Base: http://192.168.60.117/iEMS/public/server.php</div>
  </header>

  <!-- 1. RFID 登入 -->
  <section>
    <h2>/api/login/rfid</h2>
    <button onclick="callApi('/api/login/rfid', {
      card_uid: getVal('rfid_card_uid'),
      device_id: getVal('rfid_device_id')
    })">驗證 RFID 登入</button>
    <div class="row">
      <label>Card UID <input id="rfid_card_uid" value="RFID-ABC123"></label>
      <label>Device ID <input id="rfid_device_id" value="DEV-001"></label>
    </div>
  </section>

  <!-- 2. QR Code 登入會員 -->
  <section>
    <h2>/api/login/qrcode/member</h2>
    <button onclick="callApi('/api/login/qrcode/member', {
      email: getVal('qr_email'),
      password: getVal('qr_password'),
      device_id: getVal('qr_device_id')
    })">驗證 QR 登入</button>
    <div class="row">
      <label>Email <input id="qr_email" value="user@example.com"></label>
      <label>Password <input id="qr_password" type="password" value="secret"></label>
    </div>
    <label>Device ID <input id="qr_device_id" value="DEV-002"></label>
  </section>

  <!-- 3. 建立站點 -->
  <section>
    <h2>/api/stations</h2>
    <button onclick="callApi('/api/stations', {
      code: getVal('station_code'),
      name: getVal('station_name'),
      address: getVal('station_address'),
      city: getVal('station_city'),
      district: getVal('station_district'),
      location: { latitude: parseFloat(getVal('station_lat')), longitude: parseFloat(getVal('station_lon')) },
      status: getVal('station_status')
    })">建立站點</button>
    <label>Code <input id="station_code" value="ST001"></label>
    <label>Name <input id="station_name" value="Buddy Coffee"></label>
    <label>Address <input id="station_address" value="Yan'an St. Nanjing"></label>
    <label>City <input id="station_city" value="Taipei"></label>
    <label>District <input id="station_district" value="Xinyi"></label>
    <label>Latitude <input id="station_lat" value="25.032"></label>
    <label>Longitude <input id="station_lon" value="121.565"></label>
    <label>Status <input id="station_status" value="active"></label>
  </section>

  <!-- 4. 建立/更新裝置 -->
  <section>
    <h2>/api/devices</h2>
    <button onclick="callApi('/api/devices', {
      device_id: getVal('device_id'),
      station_id: getVal('device_station_id'),
      type: getVal('device_type'),
      firmware_version: getVal('device_fw'),
      status: getVal('device_status')
    })">建立/更新裝置</button>
    <label>Device ID <input id="device_id" value="123456789"></label>
    <label>Station ID <input id="device_station_id" value="1"></label>
    <label>Type <input id="device_type" value="DC 120 kW"></label>
    <label>Firmware Version <input id="device_fw" value="v1.2.4"></label>
    <label>Status <input id="device_status" value="available"></label>
  </section>

  <!-- 5. 回報裝置狀態 -->
  <section>
    <h2>/api/devices/{id}/status</h2>
    <button onclick="callApi(`/api/devices/${encodeURIComponent(getVal('status_device_id'))}/status`, {
      device: {
        id: getVal('status_device_id'),
        timestamp: new Date().toISOString(),
        status: getVal('status_status'),
        telemetry: {
          current_a: parseFloat(getVal('status_current')),
          voltage_v: parseFloat(getVal('status_voltage')),
          temperature_c: parseFloat(getVal('status_temp')),
          power_kw: parseFloat(getVal('status_power'))
        }
      }
    })">回報裝置狀態</button>
    <label>Device ID <input id="status_device_id" value="123456789"></label>
    <label>Status <input id="status_status" value="online"></label>
    <label>Current (A) <input id="status_current" value="42.1"></label>
    <label>Voltage (V) <input id="status_voltage" value="47.5"></label>
    <label>Temperature (°C) <input id="status_temp" value="36.1"></label>
    <label>Power (kW) <input id="status_power" value="2.0"></label>
  </section>

  <!-- 6. 建立充電會話 -->
  <section>
    <h2>/api/sessions</h2>
    <button onclick="callApi('/api/sessions', {
      session: {
        session_id: getVal('session_id'),
        device_id: getVal('session_device_id'),
        user_id: getVal('session_user_id'),
        start_time: getVal('session_start'),
        end_time: getVal('session_end'),
        energy_end: parseFloat(getVal('session_energy')),
        co2_reduction_kg: parseFloat(getVal('session_co2')),
        status: getVal('session_status')
      }
    })">建立充電會話</button>
    <label>Session ID <input id="session_id" value="TX123456"></label>
    <label>Device ID <input id="session_device_id" value="123456789"></label>
    <label>User ID <input id="session_user_id" value="123"></label>
    <label>Start Time <input id="session_start" value="2025-11-25T09:00:00Z"></label>
    <label>End Time <input id="session_end" value="2025-11-25T09:30:00Z"></label>
    <label>Energy (kWh) <input id="session_energy" value="12.5"></label>
    <label>CO2 Reduction (kg) <input id="session_co2" value="6.25"></label>
    <label>Status <input id="session_status" value="finished"></label>
  </section>

  <!-- 7. 建立付款紀錄 -->
  <section>
    <h2>/api/payments</h2>
    <button onclick="callApi('/api/payments', {
      session_id: getVal('payment_session_id'),
      amount: getVal('payment_amount'),
      method: getVal('payment_method')
    })">建立付款紀錄</button>
    <label>Session ID <input id="payment_session_id" value="TX123456"></label>
    <label>Amount <input id="payment_amount" value="120.00"></label>
    <label>Method <input id="payment_method" value="CreditCard"></label>
  </section>

  <!-- 8. 建立警示 -->
  <section>
    <h2>/api/alerts</h2>
    <button onclick="callApi('/api/alerts', {
      device_id: getVal('alert_device_id'),
      station_id: getVal('alert_station_id'),
      alert_type: getVal('alert_type'),
      severity: getVal('alert_severity')
    })">建立警示</button>
    <label>Device ID <input id="alert_device_id" value="123456789"></label>
    <label>Station ID <input id="alert_station_id" value="1"></label>
    <label>Alert Type <input id="alert_type" value="Overheating"></label>
    <label>Severity <input id="alert_severity" value="critical"></label>
  </section>

  <!-- 9. 檢查韌體版本 -->
  <section>
    <h2>/api/firmware/check</h2>
    <button onclick="callApi('/api/firmware/check', {
      device_type: getVal('fw_device_type'),
      firmware_version: getVal('fw_version')
    })">檢查韌體版本</button>
    <label>Device Type <input id="fw_device_type" value="DC 120 kW"></label>
    <label>Firmware Version <input id="fw_version" value="v1.2.4"></label>
  </section>

  <!-- 10. 建立 OTA 任務 -->
  <section>
    <h2>/api/devices/{id}/actions</h2>
    <button onclick="callApi(`/api/devices/${encodeURIComponent(getVal('ota_device_id'))}/actions`, {
      device_id: getVal('ota_device_id'),
      action: 'Firmware Update',
      parameters: {
        version: getVal('ota_version'),
        source: {
          url: getVal('ota_url'),
          checksum: getVal('ota_checksum')
        },
        force: true,
        schedule: { start: new Date().toISOString() }
      },
      status: 'pending',
      triggered_at: new Date().toISOString()
    })">建立 OTA 任務</button>
    <label>Device ID <input id="ota_device_id" value="123456789"></label>
    <label>Version <input id="ota_version" value="v1.3.0"></label>
    <label>Checksum <input id="ota_checksum" value="sha256:abcd1234..."></label>
    <label>URL <input id="ota_url" value="https://cdn.example.com/fw/v1.3.0.bin"></label>
  </section>

  <hr>
  <h2>API 回傳結果</h2>
  <pre id="output"></pre>

  <script>
    const API_BASE = "http://192.168.60.117/iEMS/public";
    const getVal = (id) => document.getElementById(id).value.trim();

    function callApi(endpoint, payload) {
      fetch(API_BASE + "/server.php" + endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload ?? {})
      })
      .then(res => res.text())
      .then(text => {
        try {
          const data = JSON.parse(text);
          document.getElementById("output").textContent = JSON.stringify(data, null, 2);
        } catch {
          document.getElementById("output").textContent = text;
        }
      })
      .catch(err => {
        document.getElementById("output").textContent = "Error: " + err;
      });
    }
  </script>
</body>
</html>
